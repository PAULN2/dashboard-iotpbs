<!DOCTYPE html>
<html>
<body>
<h2>Prueba TagoIO</h2>
<button onclick="probar()">Probar conexión</button>
<pre id="out"></pre>

<script>
const TOKEN ="33e4dec9-056a-42bc-83e3-6ed4a540e00b";

async function probar() {
  const out = document.getElementById("out");
  out.textContent = "Conectando...";

  try {
    const response = await fetch(
      "https://api.us.tago.io/data?query=last_value",
      {
        method: "GET",
        headers: {
          "Authorization": TOKEN,
          "Content-Type": "application/json"
        }
      }
    );

    out.textContent =
      "HTTP " + response.status + "\n\n" + await response.text();
  } catch (error) {
    out.textContent = "Error: " + error.message;
  }
}
</script>
</body>
</html>
